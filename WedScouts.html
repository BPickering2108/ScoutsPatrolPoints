<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wednesday Scouts</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li class="dropdown">
                    <a href="index.html" class="dropbtn">Dashboard</a>
                    <div class="dropdown-content">
                        <a href="MonScouts.html">Monday Scouts</a>
                        <a href="WedScouts.html">Wednesday Scouts</a>
                    </div>
                </li>
                <li><a href="login.html">Login</a></li>
                <li><a href="pointSettings.html">Settings</a></li>
            </ul>
        </nav>
    </header>
    <h1>Wednesday Scouts</h1>
    <div class="progress-wrapper">
        <div class="progress-item">
            <div class="progress-container" data-label="Kestrel" data-points="40">
                <div class="progress-bar" style="background-color: #76c7c0;">
                    <span class="label">40</span>
                </div>
            </div>
            <div class="label-bottom">Kestrel</div>
            <div class="adjust-buttons">
                <button class="minus-button">-</button>
                <button class="plus-button">+</button>
            </div>
        </div>
        <div class="progress-item">
            <div class="progress-container" data-label="Curlew" data-points="60">
                <div class="progress-bar" style="background-color: #ff6f61;">
                    <span class="label">60</span>
                </div>
            </div>
            <div class="label-bottom">Curlew</div>
            <div class="adjust-buttons">
                <button class="minus-button">-</button>
                <button class="plus-button">+</button>
            </div>
        </div>
        <div class="progress-item">
            <div class="progress-container" data-label="Eagle" data-points="80">
                <div class="progress-bar" style="background-color: #f7b32b;">
                    <span class="label">80</span>
                </div>
            </div>
            <div class="label-bottom">Eagle</div>
            <div class="adjust-buttons">
                <button class="minus-button">-</button>
                <button class="plus-button">+</button>
            </div>
        </div>
        <div class="progress-item">
            <div class="progress-container" data-label="Woodpecker" data-points="50">
                <div class="progress-bar" style="background-color: #4a90e2;">
                    <span class="label">50</span>
                </div>
            </div>
            <div class="label-bottom">Woodpecker</div>
            <div class="adjust-buttons">
                <button class="minus-button">-</button>
                <button class="plus-button">+</button>
            </div>
        </div>
    </div>
    <script src="wed_script.js"></script>
</body>
</html>
