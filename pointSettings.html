<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point Settings</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            if (sessionStorage.getItem("authenticated") !== "true") {
                window.location.href = "login.html";
            }
        });
    </script>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li class="dropdown">
                    <a href="index.html" class="dropbtn">Dashboard</a>
                    <div class="dropdown-content">
                        <a href="MonScouts.html">Monday Scouts</a>
                        <a href="WedScouts.html">Wednesday Scouts</a>
                    </div>
                </li>
                <li><a href="login.html">Login</a></li>
                <li><a href="pointSettings.html">Settings</a></li>
            </ul>
        </nav>
    </header>
    <h1>Point Settings</h1>
    <div id="settings-container">
        <h2>Monday Scouts</h2>
        <label for="mon-max-points">Maximum Points:</label>
        <input type="number" id="mon-max-points" value="100">
        <div class="color-pickers">
            <label for="mon-color-kestrel">Kestrel:</label>
            <input type="color" id="mon-color-kestrel" value="#76c7c0">
            <label for="mon-color-curlew">Curlew:</label>
            <input type="color" id="mon-color-curlew" value="#ff6f61">
            <label for="mon-color-eagle">Eagle:</label>
            <input type="color" id="mon-color-eagle" value="#f7b32b">
            <label for="mon-color-woodpecker">Woodpecker:</label>
            <input type="color" id="mon-color-woodpecker" value="#4a90e2">
        </div>
        <button id="save-mon-settings">Save Settings</button>
        <button id="reset-mon-bars">Reset Bars</button>

        <h2>Wednesday Scouts</h2>
        <label for="wed-max-points">Maximum Points:</label>
        <input type="number" id="wed-max-points" value="100">
        <div class="color-pickers">
            <label for="wed-color-kestrel">Kestrel:</label>
            <input type="color" id="wed-color-kestrel" value="#76c7c0">
            <label for="wed-color-curlew">Curlew:</label>
            <input type="color" id="wed-color-curlew" value="#ff6f61">
            <label for="wed-color-eagle">Eagle:</label>
            <input type="color" id="wed-color-eagle" value="#f7b32b">
            <label for="wed-color-woodpecker">Woodpecker:</label>
            <input type="color" id="wed-color-woodpecker" value="#4a90e2">
        </div>
        <button id="save-wed-settings">Save Settings</button>
        <button id="reset-wed-bars">Reset Bars</button>
    </div>
    <script src="settings.js"></script>
</body>
</html>
